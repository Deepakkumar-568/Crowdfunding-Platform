<div class="auth-wrapper flex items-center justify-center">
  <div class="card auth-card glass-panel p-6">
    <div class="text-center mb-4">
      <span class="material-icons auth-icon">lock_open</span>
      <h2 class="font-display">Welcome Back</h2>
      <p class="text-muted">Enter credentials to access your Crowdfunding Platform Dashboard</p>
    </div>

    @if (errorMessage()) {
      <div class="error-panel p-6 mb-4">
        <p>{{ errorMessage() }}</p>
      </div>
    }

    <form (submit)="onSubmit($event)" class="flex flex-col gap-4">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" [(ngModel)]="email" required autocomplete="email" class="form-control" />
      </div>

      <div class="form-group">
        <div class="flex justify-between items-center">
          <label for="password">Password</label>
          <a routerLink="/auth/forgot" class="forgot-link text-sm">Forgot Password?</a>
        </div>
        <input type="password" id="password" name="password" [(ngModel)]="password" required autocomplete="current-password" class="form-control" />
      </div>

      <button type="submit" [disabled]="loading()" class="btn btn-primary btn-full mt-4">
        @if (loading()) {
          <span class="material-icons rotate font-16">sync</span> Verifying...
        } @else {
          Sign In
        }
      </button>
    </form>

    <div class="auth-footer text-center mt-4 pt-4 border-top">
      <p class="text-muted">New to Crowdfunding Platform? <a routerLink="/auth/register">Create an account</a></p>
    </div>
  </div>
</div>
