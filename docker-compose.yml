version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: antigravity-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: antigravity_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  ollama:
    image: ollama/ollama:latest
    container_name: antigravity-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  backend:
    build:
      context: ./Antigravity.Backend
      dockerfile: Dockerfile
    container_name: antigravity-backend
    ports:
      - "7165:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=antigravity_db;User=root;Password=rootpassword;
      - Jwt__Secret=AntigravitySuperSecretKeyForJWTSignaturesPlaceholder2026
      - Jwt__Issuer=Antigravity
      - Jwt__Audience=AntigravityUsers
      - Ollama__BaseUrl=http://ollama:11434
    depends_on:
      - db
      - ollama

  frontend:
    build:
      context: ./Antigravity.Frontend
      dockerfile: Dockerfile
    container_name: antigravity-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  ollama-data:
